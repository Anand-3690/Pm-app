services:
  app:
    build: .
    container_name: pm-app
    restart: unless-stopped
    env_file:
      - .env.production
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    container_name: pm-app-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
